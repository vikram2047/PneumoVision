<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Result - Pneumonia Classification</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <style>
      * {
        font-family: 'Inter', sans-serif;
      }
      body {
        background: #ffffff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .main-card {
        background: white;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
        padding: 2.5rem;
        margin: 2rem;
        max-width: 950px;
        width: 100%;
      }
      .result-layout {
        display: flex;
        gap: 2.5rem;
        align-items: center;
      }
      .image-side {
        flex: 1.2;
      }
      .result-image {
        width: 100%;
        max-height: 500px;
        object-fit: contain;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        background: #f7fafc;
      }
      .result-side {
        flex: 1;
        text-align: center;
      }
      .status-badge {
        display: inline-block;
        padding: 0.6rem 1.5rem;
        border-radius: 24px;
        font-weight: 700;
        font-size: 1.3rem;
        margin: 1.5rem 0;
      }
      .status-normal {
        background: #f0fff4;
        color: #276749;
        border: 2px solid #c6f6d5;
      }
      .status-pneumonia {
        background: #fff5f5;
        color: #c53030;
        border: 2px solid #fed7d7;
      }
      .probability-text {
        color: #4a5568;
        font-size: 1.05rem;
        line-height: 1.6;
        margin-bottom: 2rem;
      }
      .back-btn {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        font-weight: 600;
        border-radius: 8px;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .back-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
      }
      @media (max-width: 768px) {
        .result-layout {
          flex-direction: column;
        }
      }
    </style>
  </head>

  <body>
    <div class="main-card">
      <h1 class="title is-4 has-text-centered" style="color: #2d3748; margin-bottom: 2rem;">
        Classification Result
      </h1>

      <div class="result-layout">
        <!-- Left: Image -->
        <div class="image-side">
          <img src="{{ url_for('static', filename='image.png') }}" alt="X-ray" class="result-image" />
        </div>

        <!-- Right: Result -->
        <div class="result-side">
          <p style="color: #718096; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;">
            Diagnosis
          </p>
          <span class="status-badge {% if predicted_name == 'NORMAL' %}status-normal{% else %}status-pneumonia{% endif %}">
            {{ predicted_name }}
          </span>

          <p class="probability-text">{{ probability }}</p>

          <a href="/" class="button is-medium is-primary back-btn">
            <span class="icon"><i class="fas fa-arrow-left"></i></span>
            <span>Classify Another</span>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
